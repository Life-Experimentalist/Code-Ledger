name: Deploy Worker

on:
    push:
        branches: [ main ]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Generate wrangler.toml from secrets
              run: |
                  cat > worker/wrangler.toml <<EOF
                  name = "codeledger"
                  main = "src/index.js"
                  compatibility_date = "$(date -u +%F)"
                  account_id = "${{ secrets.CF_ACCOUNT_ID }}"

                  [[kv_namespaces]]
                  binding = "CANONICAL_MAP"
                  id = "${{ secrets.CANONICAL_KV_ID }}"

                  [site]
                  bucket = "./public"

                  [env.production]
                  name = "codeledger"
                  route = "codeledger.vkrishna04.me/api/*"
                  EOF

            - name: Validate required secrets
              run: |
                  if [ -z "${{ secrets.CF_API_TOKEN }}" ] || [ -z "${{ secrets.CF_ACCOUNT_ID }}" ] || [ -z "${{ secrets.CANONICAL_KV_ID }}" ]; then
                    echo "Required secrets CF_API_TOKEN, CF_ACCOUNT_ID, and CANONICAL_KV_ID must be set in repository secrets.";
                    exit 1;
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install worker dependencies
              working-directory: ./worker
              run: npm ci

            - name: Publish to Cloudflare Workers
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CF_API_TOKEN }}
                  workingDirectory: ./worker
                  environment: production
