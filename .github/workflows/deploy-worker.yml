name: Deploy Worker

on:
    push:
        branches: [ main ]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Generate wrangler.toml from secrets
              run: |
                  cat > worker/wrangler.toml <<EOF
                  name = "codeledger"
                  main = "src/index.js"
                  compatibility_date = "$(date -u +%F)"
                  account_id = "${{ secrets.CF_ACCOUNT_ID }}"

                  [site]
                  bucket = "./public"

                  [[kv_namespaces]]
                  binding = "CANONICAL_MAP"
                  id = "${{ secrets.CANONICAL_KV_ID }}"
                  EOF

            - name: Validate required secrets
              run: |
                  if [ -z "${{ secrets.CF_API_TOKEN }}" ] || [ -z "${{ secrets.CF_ACCOUNT_ID }}" ] || [ -z "${{ secrets.CANONICAL_KV_ID }}" ]; then
                    echo "Required secrets CF_API_TOKEN, CF_ACCOUNT_ID, and CANONICAL_KV_ID must be set in repository secrets.";
                    exit 1;
                  fi

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Install worker dependencies
              working-directory: ./worker
              run: npm ci

            - name: Upload runtime secrets to Cloudflare
              working-directory: ./worker
              env:
                  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
              run: |
                  printf "%s" "${{ secrets.CANONICAL_UPLOAD_TOKEN }}" | npx wrangler secret put CANONICAL_UPLOAD_TOKEN
                  printf "%s" "${{ secrets.SESSION_SECRET }}" | npx wrangler secret put SESSION_SECRET
                  printf "%s" "${{ secrets.CODELEDGER_GH_APP_PRIVATE_KEY }}" | npx wrangler secret put CODELEDGER_GH_APP_PRIVATE_KEY
                  printf "%s" "${{ secrets.CODELEDGER_GH_APP_CLIENT_ID }}" | npx wrangler secret put CODELEDGER_GH_APP_CLIENT_ID
                  printf "%s" "${{ secrets.CODELEDGER_GH_APP_CLIENT_SECRET }}" | npx wrangler secret put CODELEDGER_GH_APP_CLIENT_SECRET
                  printf "%s" "${{ secrets.CODELEDGER_GH_APP_WEBHOOK_SECRET }}" | npx wrangler secret put CODELEDGER_GH_APP_WEBHOOK_SECRET

            - name: Publish to Cloudflare Workers
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CF_API_TOKEN }}
                  workingDirectory: ./worker
