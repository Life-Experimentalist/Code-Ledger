name: Canonical Map Validator

on:
    issues:
        types: [ opened, reopened, labeled, edited ]
    issue_comment:
        types: [ created ]
    workflow_dispatch:

permissions:
    contents: write
    issues: write

concurrency:
    group: canonical-map-validator
    cancel-in-progress: false

jobs:
    validate:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: github.event_name == 'workflow_dispatch' ||
            contains(github.event.issue.labels.*.name, 'canonical-mapping')

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  persist-credentials: true

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Validate canonical issues
              env:
                  GITHUB_TOKEN: ${{ github.token }}
                  CANONICAL_VOTES_REQUIRED: ${{ vars['CANONICAL_VOTES_REQUIRED'] || 5 }}
                  GEMINI_MODEL: ${{ vars['GEMINI_MODEL'] || 'gemini-2.5-flash' }}
                  GEMINI_API_KEYS: ${{ secrets['GEMINI_API_KEYS'] }}
                  GEMINI_API_KEY_1: ${{ secrets['GEMINI_API_KEY_1'] }}
                  GEMINI_API_KEY_2: ${{ secrets['GEMINI_API_KEY_2'] }}
                  GEMINI_API_KEY_3: ${{ secrets['GEMINI_API_KEY_3'] }}
                  CANONICAL_GEMINI_API_KEYS: ${{ vars['GEMINI_API_KEYS'] }}
                  CANONICAL_GEMINI_MODEL: ${{ vars['CANONICAL_GEMINI_MODEL'] || 'gemini-2.5-flash' }}
              run: node .github/scripts/canonical-map-validator.mjs
